#
# Configurazione della simulazione
# Bulk Service Vacation Queue con N-policy, SVR, Setup time
#
# Parametri da consegna:
# - A(t): esponenziale di media m = {0.5, 1.0, 1.4, 2.0}
# - G(X): x1=1, x2=4
# - Sr(t): a=7, b=16, sp=0.1, l=1.0, u=3.92
# - Vacation: N=20, sv=0.2, z=2.0, w=3.8
# - Setup: q=1.0
#

[General]
network = Modello_progetto
sim-time-limit = 100000s
warmup-period = 10000s
repeat = 20

# Seed impostazione per riproducibilità
seed-set = ${repetition}

# Parametri BatchSource (comuni a tutte le configurazioni)
Modello_progetto.source.x1 = 1
Modello_progetto.source.x2 = 4

# Parametri BulkServiceVacationServer (comuni a tutte le configurazioni)
Modello_progetto.server.a = 7
Modello_progetto.server.b = 16
Modello_progetto.server.sp = 0.1
Modello_progetto.server.l = 1.0
Modello_progetto.server.u = 3.92

Modello_progetto.server.N = 20
Modello_progetto.server.sv = 0.2
Modello_progetto.server.z = 2.0
Modello_progetto.server.w = 3.8

Modello_progetto.server.q = 1.0

# Statistiche Sink
Modello_progetto.sink.keepJobs = false

# Raccolta risultati
output-vector-file = "${resultdir}/${configname}-${iterationvarsf}#${repetition}.vec"
output-scalar-file = "${resultdir}/${configname}-${iterationvarsf}#${repetition}.sca"


# ======================================================================
# Configurazione 1: m = 0.5 (arrivi frequenti, alta intensità di traffico)
# ======================================================================
[Config m05]
description = "Interarrival mean m=0.5"
Modello_progetto.source.m = 0.5

# ======================================================================
# Configurazione 2: m = 1.0
# ======================================================================
[Config m10]
description = "Interarrival mean m=1.0"
Modello_progetto.source.m = 1.0

# ======================================================================
# Configurazione 3: m = 1.4
# ======================================================================
[Config m14]
description = "Interarrival mean m=1.4"
Modello_progetto.source.m = 1.4

# ======================================================================
# Configurazione 4: m = 2.0 (arrivi rari, bassa intensità di traffico)
# ======================================================================
[Config m20]
description = "Interarrival mean m=2.0"
Modello_progetto.source.m = 2.0


# ======================================================================
# Configurazioni dedicate all'analisi del transiente (warmup=0)
# ======================================================================
[Config transient_m05]
extends = m05
warmup-period = 0s
repeat = 1

[Config transient_m10]
extends = m10
warmup-period = 0s
repeat = 1

[Config transient_m14]
extends = m14
warmup-period = 0s
repeat = 1

[Config transient_m20]
extends = m20
warmup-period = 0s
repeat = 1
